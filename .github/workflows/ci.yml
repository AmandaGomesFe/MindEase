name: CI

on:
  pull_request:
    branches: [ main ]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests (with coverage)
        env:
          CI: true
        run: npm run coverage

      - name: Upload coverage report
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build production bundle
        run: npm run build

  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check Vercel secret
        env:
          VERCEL_TOKEN: ${{ secrets.MINDEASE }}
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "ERROR: VERCEL_TOKEN (secrets.MINDEASE) not set — set repository secret MINDEASE to enable deploys"
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci
      - name: Vercel token identity (debug)
        env:
          VERCEL_TOKEN: ${{ secrets.MINDEASE }}
        run: |
          echo "== Vercel token owner =="
          # Print which account/team the token belongs to. Helps debug permission issues.
          npx vercel whoami --token "$VERCEL_TOKEN" || true

      - name: Show git commit author (debug)
        run: |
          echo "== Last commit info =="
          git --no-pager log -1 --pretty=format:'%H %an <%ae>' || true
          echo

      - name: Deploy to Vercel (production)
        env:
          VERCEL_TOKEN: ${{ secrets.MINDEASE }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          # This uses the Vercel CLI to deploy to production. It requires the
          # VERCEL_TOKEN secret to be set in repository secrets. Optionally set
          # VERCEL_ORG_ID for scope.
          # Use --yes instead of deprecated --confirm and pass the token explicitly.
          npx vercel --prod --yes --token "$VERCEL_TOKEN" ${VERCEL_ORG_ID:+--scope $VERCEL_ORG_ID}

